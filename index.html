<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SBS - Movement Dashboard DWI/KCN</title>
  <style>
    :root {
      --navy: #111c4e;
      --navy-2: #18386a;
      --yellow: #ffef5e;
      --yellow-soft: #fff8a6;
      --green: #4caf50;
      --red: #ef2f2f;
      --blue: #0e95bf;
      --text: #202124;
      --muted: #6b7280;
      --line: #d8dde7;
      --bg: #f4f7fb;
      --white: #ffffff;
      --shadow: 0 16px 40px rgba(17, 28, 78, 0.14);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    button, input, select, textarea { font: inherit; }

    button {
      border: none;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease, box-shadow .15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); opacity: .88; }
    button:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .screen {
      width: min(1120px, 100%);
      margin: 0 auto;
      min-height: 100vh;
      background: #fff;
      box-shadow: 0 0 0 1px rgba(17, 28, 78, .05);
    }

    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      background: linear-gradient(135deg, var(--navy) 0%, #193c70 100%);
    }

    .login-card {
      width: min(420px, 100%);
      background: var(--white);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 34px 28px 26px;
      text-align: center;
    }

    .login-logo {
      width: 82px;
      height: 58px;
      object-fit: contain;
      margin-bottom: 10px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: #b7c0d7;
      font-size: 12px;
      letter-spacing: .14em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .login-card h1 {
      margin: 0;
      color: var(--navy);
      font-size: 24px;
      letter-spacing: -.03em;
    }

    .login-card p { color: var(--muted); margin: 10px 0 20px; }

    .password-row { display: flex; gap: 10px; margin-top: 14px; }

    .input, .select, .textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #f8fbff;
      border-radius: 12px;
      padding: 13px 14px;
      outline: none;
      color: var(--text);
    }

    .input:focus, .select:focus, .textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(14, 149, 191, .12);
    }

    .btn {
      border-radius: 12px;
      padding: 12px 18px;
      font-weight: 800;
      color: var(--white);
      background: var(--navy-2);
      box-shadow: 0 8px 20px rgba(24, 56, 106, .15);
    }

    .btn.full { width: 100%; margin-top: 12px; }
    .btn.blue { background: var(--blue); }
    .btn.green { background: var(--green); }
    .btn.red { background: var(--red); }
    .btn.yellow { background: #ffe000; color: var(--navy); }
    .btn.light { background: #edf2fb; color: var(--navy); box-shadow: none; }
    .btn.small { padding: 8px 12px; border-radius: 10px; font-size: 13px; }

    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 16px;
    }

    .error { color: var(--red); font-weight: 700; min-height: 20px; margin-top: 10px; }

    .header {
      background: var(--navy);
      color: var(--white);
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 20px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 7px 18px rgba(17, 28, 78, .18);
    }

    .brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .brand-logo {
      width: 68px;
      height: 48px;
      object-fit: contain;
      background: rgba(255,255,255,.08);
      border-radius: 7px;
      padding: 3px;
    }
    .brand-title { font-weight: 900; letter-spacing: -.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand-sub { color: #c8d5ef; font-size: 12px; margin-top: 2px; }

    .header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }

    .content { padding: 20px; }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .searchbar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 14px;
      flex: 1 1 320px;
      box-shadow: 0 4px 14px rgba(17,28,78,.06);
    }
    .searchbar span { color: var(--muted); }
    .searchbar input { border: 0; outline: 0; width: 100%; background: transparent; padding: 6px 0; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: #f8fbff;
      border: 1px solid var(--line);
      border-radius: 15px;
      padding: 14px;
    }
    .stat-card b { display: block; color: var(--navy); font-size: 24px; margin-bottom: 3px; }
    .stat-card span { color: var(--muted); font-size: 12px; }

    .list { display: grid; gap: 10px; }

    .container-card, .task-card, .history-card {
      background: linear-gradient(180deg, var(--yellow) 0%, #fff17a 100%);
      border: 1px solid #dfc900;
      border-bottom: 4px solid rgba(17, 28, 78, .2);
      border-radius: 8px;
      padding: 14px;
      display: grid;
      grid-template-columns: minmax(120px, 1.05fr) minmax(170px, 1.8fr) 110px;
      align-items: center;
      gap: 12px;
      text-align: left;
      color: var(--text);
    }

    .history-card { grid-template-columns: minmax(120px, 1fr) minmax(160px, 1fr) minmax(160px, 1fr); cursor: pointer; }
    .task-card { grid-template-columns: minmax(130px, 1fr) minmax(260px, 2fr) 120px; }
    .task-actions { display: grid; gap: 8px; }
    .container-card { cursor: pointer; }

    .card-title {
      font-weight: 900;
      color: #e52323;
      font-size: 18px;
      word-break: break-word;
    }
    .card-meta { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 4px 14px; font-size: 13px; }
    .card-meta b { color: var(--navy); }
    .photo-thumb {
      width: 96px;
      height: 76px;
      border: 2px solid #e6e6e6;
      background: #fff;
      border-radius: 4px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      justify-self: end;
    }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }

    .empty {
      background: #f8fbff;
      border: 1px dashed #a8b4cc;
      color: var(--muted);
      border-radius: var(--radius);
      padding: 30px;
      text-align: center;
      line-height: 1.5;
    }

    .form-page {
      display: grid;
      grid-template-columns: minmax(280px, 560px) minmax(220px, 1fr);
      gap: 24px;
      align-items: start;
    }

    .form-card, .info-card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(17, 28, 78, .08);
      padding: 18px;
    }

    .form-title {
      text-align: center;
      color: var(--navy);
      margin: 0 0 18px;
      font-size: 20px;
      letter-spacing: -.02em;
      text-transform: uppercase;
    }

    .field {
      background: var(--yellow-soft);
      border: 1px solid #e8d72d;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
    }
    .field label { display: block; color: var(--navy); font-weight: 900; font-size: 12px; text-transform: uppercase; margin-bottom: 6px; }
    .driver-grid { display: grid; grid-template-columns: 84px 1fr; gap: 8px; align-items: center; }
    .driver-grid span { font-size: 12px; color: var(--navy); font-weight: 800; }

    .preview-box {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      min-height: 280px;
      padding: 16px;
      text-align: center;
      color: var(--muted);
      display: grid;
      place-items: center;
    }
    .preview-box img { width: 100%; max-height: 420px; object-fit: contain; border-radius: 12px; }

    .info-layout {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 22px;
      align-items: start;
    }
    .info-list { display: grid; gap: 14px; }
    .info-line { display: grid; grid-template-columns: 140px 1fr; gap: 10px; align-items: start; }
    .info-line b { color: var(--navy); }
    .info-photo {
      width: 100%;
      min-height: 320px;
      border: 2px solid #c9c9c9;
      background: #fff;
      display: grid;
      place-items: center;
      color: var(--muted);
      overflow: hidden;
    }
    .info-photo img { width: 100%; height: 100%; object-fit: cover; }
    .info-actions { display: flex; gap: 14px; justify-content: center; margin-top: 28px; flex-wrap: wrap; }

    .history-detail {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
      align-items: start;
    }
    .split-section { border-bottom: 2px solid #bfc6d8; padding-bottom: 18px; margin-bottom: 18px; }
    .split-section:last-child { border-bottom: 0; margin-bottom: 0; }
    .photo-stack { display: grid; gap: 16px; }
    .photo-label { font-weight: 900; color: var(--navy); text-align: center; margin-bottom: 5px; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .46);
      display: none;
      place-items: center;
      z-index: 50;
      padding: 20px;
    }
    .modal-backdrop.active { display: grid; }
    .modal {
      width: min(380px, 100%);
      background: #fff;
      border-radius: 16px;
      padding: 22px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .modal h3 { margin: 0 0 16px; color: var(--navy); }
    .modal-text { margin: -6px 0 12px; color: var(--muted); line-height: 1.45; }
    .confirm-number {
      margin: 10px 0 18px;
      padding: 14px;
      border-radius: 14px;
      background: var(--yellow-soft);
      color: var(--red);
      font-size: 24px;
      font-weight: 900;
      letter-spacing: .04em;
      border: 1px solid rgba(17, 28, 78, .15);
    }
    .modal-actions { display: grid; gap: 10px; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      background: var(--navy);
      color: #fff;
      padding: 12px 18px;
      border-radius: 999px;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
      z-index: 70;
      max-width: min(92vw, 620px);
      text-align: center;
    }
    .toast.show { opacity: 1; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #edf2fb;
      color: var(--navy);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 800;
    }

    .sync-note {
      border-left: 4px solid var(--blue);
      background: #eef9fd;
      padding: 12px 14px;
      border-radius: 12px;
      color: #20435a;
      margin-top: 12px;
      text-align: left;
      font-size: 13px;
      line-height: 1.45;
    }

    details.integration {
      text-align: left;
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    details.integration summary { cursor: pointer; color: var(--navy); font-weight: 900; }
    code { background: #eef2f7; padding: 1px 5px; border-radius: 5px; }

    .tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 0 0 16px;
    }

    .tab-btn {
      border-radius: 999px;
      padding: 10px 16px;
      background: #edf2fb;
      color: var(--navy);
      font-weight: 900;
      box-shadow: none;
    }

    .tab-btn.active {
      background: var(--navy);
      color: #fff;
      box-shadow: 0 8px 20px rgba(17, 28, 78, .16);
    }

    .stock-table-wrap {
      width: 100%;
      overflow-x: auto;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(17, 28, 78, .07);
    }

    .stock-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }

    .stock-table th,
    .stock-table td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 14px;
    }

    .stock-table th {
      background: var(--navy);
      color: #fff;
      font-weight: 900;
    }

    .stock-table tr:last-child td { border-bottom: 0; }
    .depot-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 10px;
      background: var(--yellow-soft);
      border: 1px solid #e8d72d;
      color: var(--navy);
      font-weight: 900;
      font-size: 12px;
    }


    @media (max-width: 820px) {
      .screen { box-shadow: none; }
      .header { align-items: flex-start; }
      .brand-title { white-space: normal; }
      .stats { grid-template-columns: 1fr; }
      .container-card, .task-card, .history-card { grid-template-columns: 1fr; }
      .photo-thumb { justify-self: start; width: 120px; height: 86px; }
      .form-page, .info-layout, .history-detail { grid-template-columns: 1fr; }
      .info-photo { min-height: 240px; }
      .card-meta { grid-template-columns: 1fr; }
      .content { padding: 14px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="modalRoot" class="modal-backdrop"></div>
  <div id="toast" class="toast"></div>

  <script>
    /**********************************************************************
     * SBS - DWI Movement Dashboard
     * Single HTML application.
     *
     * IMPORTANT UNTUK SAVE KE GOOGLE SHEETS & DRIVE:
     * Browser HTML statis tidak bisa langsung write ke Google Sheets/Drive
     * tanpa otorisasi/backend. Isi APPS_SCRIPT_URL dengan URL Web App dari
     * Google Apps Script agar data tersimpan ke spreadsheet dan photo ke Drive.
     * Jika kosong, website tetap berjalan sebagai DEMO menggunakan localStorage.
     **********************************************************************/

    const CONFIG = {
      COMPANY_LOGO: "https://www.sbs-icd.com/assets/img/logosbs.png",
      SHEET_URL: "https://docs.google.com/spreadsheets/d/15A_Qv5Q-z08t6RJGk-MCmFCBGkcinEAhBFJXmevN7fY/edit?usp=sharing",
      DRIVE_FOLDER_URL: "https://drive.google.com/drive/folders/1FZx3DGaK2Mdfyf3N_cj11zhrMSnhk9wU?usp=drive_link",
      SHEET_ID: "15A_Qv5Q-z08t6RJGk-MCmFCBGkcinEAhBFJXmevN7fY",
      DRIVE_FOLDER_ID: "1FZx3DGaK2Mdfyf3N_cj11zhrMSnhk9wU",
      APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbz1aknMLFceng5K9bJDosGNbvIGvbVG96R5cNdPWLuCTsXVAa6390gq3NKst5O9dJUOMw/exec", // isi contoh: https://script.google.com/macros/s/AKfycbxxxx/exec
      HISTORY_DAYS: 30,
      PASSWORDS: {
        stackdwi: "stacking_dwi",
        stackcn: "stacking_kcn",
        eqp2026: "equipment"
      },
      DEPOTS: {
        DWI: { label: "Stack DWI", title: "SBS - DWI", customers: ["MLII"] },
        KCN: { label: "Stack KCN", title: "SBS - KCN", customers: ["TWD", "MTR", "OTHERS"] }
      }
    };

    const STORAGE_KEY = "sbs_dwi_movement_state_v1";
    const SESSION_KEY = "sbs_dwi_session";

    let route = { page: "login", id: null, search: "", depot: "DWI" };
    let currentPhoto = null;
    let validatingEventId = null;
    let pendingContainerPayload = null;
    let isSubmitting = false;
    let isValidating = false;
    let isDeleting = false;
    let state = loadLocalState();

    document.addEventListener("DOMContentLoaded", init);

    function init() {
      cleanupHistory();
      const session = getSession();
      if (isStackingRole(session?.role)) {
        route.page = "stacking";
        route.depot = depotFromRole(session.role);
      }
      if (session?.role === "equipment") {
        route.page = "equipment";
        route.depot = "DWI";
      }
      render();
      remoteLoadIfConfigured();
    }

    function loadLocalState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { events: [] };
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed.events)) return { events: [] };
        return parsed;
      } catch (error) {
        return { events: [] };
      }
    }

    function persist() {
      cleanupHistory(false);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function getSession() {
      try { return JSON.parse(sessionStorage.getItem(SESSION_KEY)); }
      catch (error) { return null; }
    }

    function setSession(role) {
      sessionStorage.setItem(SESSION_KEY, JSON.stringify({ role, loginAt: new Date().toISOString() }));
    }


    function isStackingRole(role) {
      return role === "stacking_dwi" || role === "stacking_kcn" || role === "stacking";
    }

    function depotFromRole(role) {
      if (role === "stacking_kcn") return "KCN";
      if (role === "stacking_dwi" || role === "stacking") return "DWI";
      return route.depot || "DWI";
    }

    function getCurrentDepot() {
      const session = getSession();
      if (isStackingRole(session?.role)) return depotFromRole(session.role);
      return route.depot || "DWI";
    }

    function depotConfig(depot) {
      const key = normalizeDepot(depot);
      return CONFIG.DEPOTS[key] || CONFIG.DEPOTS.DWI;
    }

    function normalizeDepot(value) {
      const depot = norm(value || "DWI");
      return depot === "KCN" ? "KCN" : "DWI";
    }

    function eventDepot(ev) {
      return normalizeDepot(ev?.depot || "DWI");
    }

    function logout() {
      sessionStorage.removeItem(SESSION_KEY);
      route = { page: "login", id: null, search: "", depot: "DWI" };
      currentPhoto = null;
      render();
      toast("Berhasil logout.");
    }

    function cleanupHistory(shouldPersist = true) {
      const cutoff = Date.now() - CONFIG.HISTORY_DAYS * 24 * 60 * 60 * 1000;
      const before = state.events.length;
      const containerKeysToDelete = new Set();
      state.events.forEach(ev => {
        ev.depot = eventDepot(ev);
        const isOut = ev.type === "OUT" || norm(ev.movement).startsWith("RP");
        const dateMs = new Date(ev.date).getTime();
        if (isOut && Number.isFinite(dateMs) && dateMs < cutoff) {
          containerKeysToDelete.add(`${eventDepot(ev)}|${norm(ev.container)}`);
        }
      });
      if (containerKeysToDelete.size) {
        state.events = state.events.filter(ev => !containerKeysToDelete.has(`${eventDepot(ev)}|${norm(ev.container)}`));
      }
      if (shouldPersist && before !== state.events.length) localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    async function remoteLoadIfConfigured() {
      if (!CONFIG.APPS_SCRIPT_URL) return;
      try {
        const res = await fetch(`${CONFIG.APPS_SCRIPT_URL}?action=list`, { method: "GET" });
        const data = await res.json();
        if (data && Array.isArray(data.events)) {
          state.events = data.events.map(ev => ({ ...ev, depot: eventDepot(ev) }));
          persist();
          render();
          toast("Data berhasil dimuat dari Spreadsheet.");
        }
      } catch (error) {
        console.warn("Remote load failed", error);
        toast("Koneksi Spreadsheet belum berhasil, memakai data lokal sementara.");
      }
    }

    async function remoteSaveEvent(event) {
      if (!CONFIG.APPS_SCRIPT_URL) return { ok: false, localOnly: true };
      try {
        const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ action: "saveEvent", event, folderId: CONFIG.DRIVE_FOLDER_ID, sheetId: CONFIG.SHEET_ID })
        });
        const data = await res.json();
        if (data?.event) {
          const idx = state.events.findIndex(e => e.id === event.id);
          if (idx >= 0) state.events[idx] = data.event;
          persist();
        }
        return { ok: true, data };
      } catch (error) {
        console.warn("Remote save failed", error);
        toast("Data tersimpan lokal. Cek Apps Script URL untuk sinkron ke Spreadsheet.");
        return { ok: false, error };
      }
    }

    async function remoteDeleteEvent(event) {
      if (!CONFIG.APPS_SCRIPT_URL) return { ok: false, localOnly: true };
      try {
        const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ action: "deleteEvent", id: event.id, clientKey: event.clientKey, event })
        });
        const data = await res.json();
        if (!data?.ok) throw new Error(data?.message || "Delete gagal");
        return { ok: true, data };
      } catch (error) {
        console.warn("Remote delete failed", error);
        toast("Task terhapus lokal, namun delete ke Spreadsheet belum berhasil. Cek Apps Script terbaru.");
        return { ok: false, error };
      }
    }

    function render() {
      const session = getSession();
      if (!session) return renderLogin();
      if (route.page === "stacking") return renderStacking();
      if (route.page === "add") return renderAddContainer();
      if (route.page === "info") return renderContainerInfo(route.id);
      if (route.page === "out") return renderContainerOut(route.id);
      if (route.page === "equipment") return renderEquipment();
      if (route.page === "stock") return renderStock();
      if (route.page === "history") return renderHistory();

      if (!payload.container) return toast("No. Container wajib diisi.");

      if (hasActiveContainer(payload.container, payload.depot)) {

      pendingContainerPayload = payload;

    function confirmContainerInSubmit() {
      if (isSubmitting) return;
      const payload = pendingContainerPayload;
      if (!payload) return closeModal();

      if (hasActiveContainer(payload.container, payload.depot) || state.events.some(ev => ev.id === payload.id || ev.clientKey === payload.clientKey)) {
        closeModal();
        return toast(`Container ${payload.container} sudah pernah disubmit di ${payload.depot}, data tidak dibuat double.`);
      }

      isSubmitting = true;
      const btn = document.getElementById("confirmSubmitInBtn");
      if (btn) {
        btn.disabled = true;
        btn.textContent = "Submitting...";
      }

      state.events.push(payload);
      persist();
      pendingContainerPayload = null;
      currentPhoto = null;
      closeModal();
      route = { page: "stacking", id: null, search: "", depot: payload.depot };
      render();
      toast(`Container berhasil ditambahkan ke ${payload.depot} dan masuk ke task Equipment.`);

      remoteSaveEvent(payload)
        .then(() => { if (route.page === "stacking") render(); })
        .finally(() => { isSubmitting = false; });

    async function submitContainerOut(event, inEventId) {
      event.preventDefault();
      if (isSubmitting) return;

      const inEv = state.events.find(e => e.id === inEventId);
      const payload = collectForm("OUT");
      payload.relatedInId = inEventId;
      payload.depot = eventDepot(inEv);
      payload.container = (payload.container || inEv?.container || "").toUpperCase();
      payload.clientKey = buildClientKey(payload);

      if (!payload.customer) return toast("Customer wajib diisi. Jika pilih OTHERS, isi nama customer manual.");
      if (!payload.container) return toast("No. Container wajib diisi.");
      if (hasOutForInEvent(inEventId)) return toast(`Container ${payload.container} sudah pernah OUT, data tidak dibuat double.`);

      isSubmitting = true;
      const btn = event.submitter || document.getElementById("submitOutBtn");
      if (btn) {
        btn.disabled = true;
        btn.textContent = "Submitting...";
      }

      state.events.push(payload);
      persist();
      route = { page: "stacking", id: null, search: "", depot: payload.depot };
      currentPhoto = null;
      render();
      toast(`Container OUT ${payload.depot} berhasil disubmit dan masuk ke task Equipment.`);

      remoteSaveEvent(payload)
        .then(() => { if (route.page === "stacking") render(); })
        .finally(() => { isSubmitting = false; });

    function downloadStockExcel() {
      const depotFilter = route.depot || "ALL";
      const stock = getActiveContainers(depotFilter).filter(item => matchesSearch(item.container));
      const title = `Stock Container ${depotFilter}`;
      const generatedAt = formatDate(new Date().toISOString());
      const rows = stock.map((item, index) => {
        const ev = item.inEvent || {};
        return [
          index + 1,
          formatDate(ev.date),
          item.container || "",
          ev.customer || "",
          eventDepot(ev)
        ];
      });

      const html = `
        <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
        <head><meta charset="UTF-8"></head>
        <body>
          <table border="1">
            <tr><th colspan="5" style="font-size:16pt;background:#111c4e;color:white;">${excelEsc(title)}</th></tr>
            <tr><td colspan="5">Generated at: ${excelEsc(generatedAt)}</td></tr>
            <tr><td colspan="5">Filter: ${excelEsc(depotFilter)}${route.search ? ` | Search: ${excelEsc(route.search)}` : ""}</td></tr>
            <tr style="background:#111c4e;color:white;font-weight:bold;"><th>No</th><th>Date</th><th>Container</th><th>Customer</th><th>Depot</th></tr>
            ${rows.length ? rows.map(row => `<tr>${row.map(cell => `<td>${excelEsc(cell)}</td>`).join("")}</tr>`).join("") : `<tr><td colspan="5">Tidak ada stock container aktif.</td></tr>`}
          </table>
        </body></html>`;

      const blob = new Blob([html], { type: "application/vnd.ms-excel;charset=utf-8" });
      const fileName = `Stock_Container_${depotFilter}_${fileDateStamp()}.xls`;
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      toast(`Stock berhasil didownload: ${fileName}`);
    }

    function excelEsc(value) {
      return String(value ?? "").replace(/[&<>]/g, ch => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;" }[ch]));
    }

    function fileDateStamp() {
      const d = new Date();
      const pad = n => String(n).padStart(2, "0");
      return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`;
    }

    async function submitValidate() {
      if (isValidating) return;

      const name = document.getElementById("equipmentName")?.value.trim();
      if (!name) return toast("Equipment Name wajib diisi.");

      const ev = state.events.find(e => e.id === validatingEventId);
      if (!ev) return closeModal();

      if (ev.status === "validated") {
        closeModal();
        route = { page: "equipment", id: null, search: route.search || "", depot: eventDepot(ev) };
        render();
        return toast("Task ini sudah divalidasi sebelumnya.");
      }

      isValidating = true;
      const btn = document.getElementById("validateSubmitBtn");
      if (btn) {
        btn.disabled = true;
        btn.textContent = "Submitting...";
      }

      ev.status = "validated";
      ev.depot = eventDepot(ev);
      ev.equipmentName = name;
      ev.validatedAt = new Date().toISOString();
      ev.clientKey = ev.clientKey || buildClientKey(ev);
      persist();

      closeModal();
      route = { page: "equipment", id: null, search: route.search || "", depot: eventDepot(ev) };
      render();
      toast("Task sudah divalidasi oleh Equipment.");

      remoteSaveEvent(ev)
        .then(() => { if (route.page === "equipment") render(); })
        .finally(() => { isValidating = false; });
    }

    function openDeleteTask(eventId) {
      const ev = state.events.find(e => e.id === eventId);
      if (!ev) return toast("Task tidak ditemukan.");
      validatingEventId = eventId;
      document.getElementById("modalRoot").className = "modal-backdrop active";
      document.getElementById("modalRoot").innerHTML = `
        <div class="modal">
          <h3>Delete task dari sistem?</h3>

          <div class="modal-actions">
            <button id="deleteTaskBtn" class="btn red" onclick="confirmDeleteTask()">Ya, Delete</button>
            <button class="btn light" onclick="closeModal()">Cancel</button>
          </div>
        </div>
      `;
    }

    async function confirmDeleteTask() {
      if (isDeleting) return;
      const ev = state.events.find(e => e.id === validatingEventId);
      if (!ev) return closeModal();

      isDeleting = true;
      const btn = document.getElementById("deleteTaskBtn");
      if (btn) {
        btn.disabled = true;
        btn.textContent = "Deleting...";
      }

      const deletedDepot = eventDepot(ev);
      state.events = state.events.filter(item => item.id !== ev.id);
      persist();
      closeModal();
      route = { page: "equipment", id: null, search: route.search || "", depot: deletedDepot };
      render();
      toast(`Task ${ev.container} berhasil dihapus dari sistem.`);

      remoteDeleteEvent(ev)
        .then((result) => { if (result.ok && route.page === "equipment") remoteLoadIfConfigured(); })
        .finally(() => { isDeleting = false; });
    }

      layout(
        "HISTORY SBS - EQP",
        `Container OUT maksimal ${CONFIG.HISTORY_DAYS} hari`,
        `<button class="btn red small" onclick="go('equipment')">BACK</button><button class="btn red small" onclick="logout()">Logout</button>`,
        `
          ${equipmentDepotTabs(depotFilter, "history")}
          <div class="toolbar">${searchInput("Search No. Container")}</div>
          <div class="list">
            ${history.length ? history.map(historyCard).join("") : emptyState("Belum ada history container OUT yang sudah divalidasi Equipment.")}
          </div>
        `
      );
    }

    function historyCard(item) {
      return `
        <button class="history-card" onclick="go('historyInfo', '${item.key || item.container}')">
          <div class="card-title">${esc(item.container)} <span class="depot-badge">${esc(item.depot)}</span></div>
          <div><b>Date IN</b> : ${formatDate(item.inEvent?.date)}</div>
          <div><b>Date OUT</b> : ${formatDate(item.outEvent?.date)}</div>
        </button>
      `;
    }

    function renderHistoryInfo(containerKey) {
      const item = getHistoryContainers("ALL").find(h => norm(h.key) === norm(containerKey) || norm(h.container) === norm(containerKey));
      if (!item) return go("history");
      const inEv = item.inEvent;
      const outEv = item.outEvent;
      layout(
        "SBS - EQP",
        "History Container Info",
        `<button class="btn red small" onclick="logout()">Logout</button>`,
        `
          <section class="info-card">
            <h2 class="form-title" style="text-align:left">CONTAINER INFO</h2>
            <div class="history-detail">
              <div>
                <div class="split-section">
                  ${infoLine("Date IN", formatDate(inEv?.date))}
                  ${infoLine("No. Container", item.container)}
                  ${infoLine("Customer", inEv?.customer || "-")}
                  ${infoLine("Depot", item.depot)}
                  ${infoLine("Info Driver", driverInfo(inEv))}
                  ${infoLine("Stacking IN", inEv?.stacking || "-")}
                  ${infoLine("Equipment IN", inEv?.equipmentName || "-")}
                </div>
                <div class="split-section">
                  ${infoLine("Date OUT", formatDate(outEv?.date))}
                  ${infoLine("No. Container", item.container)}
                  ${infoLine("Customer", outEv?.customer || "-")}
                  ${infoLine("Depot", item.depot)}
                  ${infoLine("Info Driver", driverInfo(outEv))}
                  ${infoLine("Stacking OUT", outEv?.stacking || "-")}
                  ${infoLine("Equipment OUT", outEv?.equipmentName || "-")}
                </div>
                <div class="info-actions"><button class="btn red" onclick="go('history')">BACK</button></div>
              </div>
              <div class="photo-stack">
                <div><div class="photo-label">Photo IN</div><div class="info-photo">${photoMarkup(inEv, "Photo IN")}</div></div>
                <div><div class="photo-label">Photo OUT</div><div class="info-photo">${photoMarkup(outEv, "Photo OUT")}</div></div>
              </div>
            </div>
          </section>
        `
      );
    }

    function collectForm(type) {
      const container = getVal("container").toUpperCase().replace(/\s+/g, "");
      const movement = getVal("movement") || (type === "IN" ? "IM" : "RP");
      const date = document.getElementById("date")?.value || nowInputValue();
      const depot = getCurrentDepot();
      const payload = {
        id: cryptoRandomId(),
        type,
        depot,
        date: normalizeDateInput(date),
        customer: getCustomerFromForm(),
        container,
        noPlat: getVal("noPlat"),
        driverName: getVal("driverName"),
        driverPhone: getVal("driverPhone"),
        movement,
        stacking: getVal("stacking"),
        photoDataUrl: currentPhoto?.dataUrl || "",
        photoName: buildPhotoName(container, movement, date),
        photoLink: "",
        status: "pending",
        equipmentName: "",
        createdAt: new Date().toISOString(),
        validatedAt: "",
        relatedInId: "",
        clientKey: ""
      };
      payload.clientKey = buildClientKey(payload);
      return payload;
    }

    function hasActiveContainer(container, depot = "ALL") {
      return getActiveContainers(depot).some(item => norm(item.container) === norm(container));
    }

    function hasOutForInEvent(inEventId) {
      return state.events.some(ev => {
        const isOut = ev.type === "OUT" || norm(ev.movement) === "RP";
        return isOut && ev.relatedInId === inEventId;
      });
    }

    function getActiveContainers(depotFilter = "ALL") {
      const filter = depotFilter || "ALL";
      const map = new Map();
      const sorted = [...state.events].sort((a,b) => new Date(a.date) - new Date(b.date));
      sorted.forEach(ev => {
        ev.depot = eventDepot(ev);
        const key = `${eventDepot(ev)}|${norm(ev.container)}`;
        if (!norm(ev.container)) return;
        if (ev.type === "IN" || norm(ev.movement).startsWith("IM")) {
          map.set(key, { key, depot: eventDepot(ev), container: ev.container, inEvent: ev, outEvent: null });
        }
        if (ev.type === "OUT" || norm(ev.movement).startsWith("RP")) {
          const item = map.get(key) || { key, depot: eventDepot(ev), container: ev.container, inEvent: null, outEvent: null };
          item.outEvent = ev;
          map.set(key, item);
        }
      });
      return [...map.values()]
        .filter(item => item.inEvent && !item.outEvent)
        .filter(item => filter === "ALL" || item.depot === normalizeDepot(filter))
        .sort((a,b) => new Date(b.inEvent.date) - new Date(a.inEvent.date));
    }

    function getPendingEvents(depotFilter = "ALL") {
      const filter = depotFilter || "ALL";
      return state.events
        .map(ev => ({ ...ev, depot: eventDepot(ev) }))
        .filter(ev => ev.status !== "validated")
        .filter(ev => filter === "ALL" || eventDepot(ev) === normalizeDepot(filter))
        .sort((a,b) => new Date(b.createdAt || b.date) - new Date(a.createdAt || a.date));
    }

    function getHistoryContainers(depotFilter = "ALL") {
      const filter = depotFilter || "ALL";
      const groups = new Map();
      const cutoff = Date.now() - CONFIG.HISTORY_DAYS * 24 * 60 * 60 * 1000;
      [...state.events].sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(ev => {
        ev.depot = eventDepot(ev);
        const key = `${eventDepot(ev)}|${norm(ev.container)}`;
        if (!norm(ev.container)) return;
        if (!groups.has(key)) groups.set(key, { key, depot: eventDepot(ev), container: ev.container, inEvent: null, outEvent: null });
        const g = groups.get(key);
        if (ev.type === "IN" || norm(ev.movement).startsWith("IM")) g.inEvent = ev;
        if ((ev.type === "OUT" || norm(ev.movement).startsWith("RP")) && ev.status === "validated") g.outEvent = ev;
      });
      return [...groups.values()]
        .filter(g => g.inEvent && g.outEvent)
        .filter(g => filter === "ALL" || g.depot === normalizeDepot(filter))
        .filter(g => new Date(g.outEvent.date).getTime() >= cutoff)
        .sort((a,b) => new Date(b.outEvent.date) - new Date(a.outEvent.date));
    }

    function go(page, id = null, depot = null) {
      route = { page, id, search: route.search || "", depot: depot || route.depot || "DWI" };
      render();
    }

    function setSearch(value) {
      route.search = value || "";
      render();
      const el = document.getElementById("searchInput");
      if (el) {
        el.focus();
        const len = el.value.length;
        el.setSelectionRange(len, len);
      }
    }

    function matchesSearch(container) {
      if (!route.search) return true;
      return norm(container).includes(norm(route.search));
    }

    function searchInput(placeholder) {
      return `
        <label class="searchbar">
          <span>🔎</span>
          <input id="searchInput" value="${esc(route.search || "")}" placeholder="${placeholder}" oninput="setSearch(this.value)" />
        </label>`;
    }

    function syncBanner() {
      if (CONFIG.APPS_SCRIPT_URL) {
        return `<div class="sync-note">Mode online aktif.</div>`;
      }
      return `<div class="sync-note"><b>Mode demo lokal:</b> APPS_SCRIPT_URL belum diisi, sehingga data hanya tersimpan pada browser ini. Untuk dipakai lintas tim Stacking & Equipment, hubungkan ke Google Apps Script Web App.</div>`;
    }

    function emptyState(text) { return `<div class="empty">${text}</div>`; }

    function textField(id, label, placeholder, required = false, value = "") {
      return `<div class="field"><label for="${id}">${label}</label><input id="${id}" class="input" type="text" placeholder="${placeholder}" value="${esc(value)}" ${required ? "required" : ""} /></div>`;
    }

    function dateField(id, label, value) {
      return `<div class="field"><label for="${id}">${label}</label><input id="${id}" class="input" type="datetime-local" value="${esc(value)}" required /></div>`;
    }

    function customerField(id, label, options, selected = "") {
      const hasSelected = options.some(opt => norm(opt) === norm(selected));
      const selectedValue = selected && !hasSelected ? "OTHERS" : (selected || options[0] || "");
      const manualValue = selected && !hasSelected ? selected : "";
      const showManual = isOtherCustomerValue(selectedValue);
      return `
        <div class="field">
          <label for="${id}">${label}</label>
          <select id="${id}" class="select" onchange="toggleCustomerManual()" required>
            ${options.map(opt => `<option value="${esc(opt)}" ${norm(opt) === norm(selectedValue) ? "selected" : ""}>${esc(opt)}</option>`).join("")}
          </select>
          <input id="customerManual" class="input" type="text" placeholder="Input customer lainnya" value="${esc(manualValue)}" style="margin-top:8px; display:${showManual ? "block" : "none"}" />
        </div>`;
    }

    function toggleCustomerManual() {
      const manual = document.getElementById("customerManual");
      if (!manual) return;
      const selected = getVal("customer");
      manual.style.display = isOtherCustomerValue(selected) ? "block" : "none";
      if (!isOtherCustomerValue(selected)) manual.value = "";
      if (isOtherCustomerValue(selected)) manual.focus();
    }

    function isOtherCustomerValue(value) {
      const v = norm(value);
      return v === "OTHERS" || v === "OTHER" || v === "LAINNYA" || v === "OTHER CUSTOMER";
    }

    function getCustomerFromForm() {
      const selected = getVal("customer");
      if (isOtherCustomerValue(selected)) return getVal("customerManual").toUpperCase();
      return selected;
    }

    function selectField(id, label, options, selected = "") {
      return `<div class="field"><label for="${id}">${label}</label><select id="${id}" class="select">${options.map(opt => `<option value="${esc(opt)}" ${opt === selected ? "selected" : ""}>${esc(opt)}</option>`).join("")}</select></div>`;
    }

    function infoLine(label, value) {
      return `<div class="info-line"><b>${esc(label)}</b><span>: ${esc(value || "-")}</span></div>`;
    }

    async function handlePhoto(file) {
      if (!file) {
        currentPhoto = null;
        const prev = document.getElementById("photoPreview");
        if (prev) prev.textContent = "Photo Preview";
        return;
      }
      try {
        const dataUrl = await resizeImage(file, 1300, 0.78);
        currentPhoto = { name: file.name, dataUrl };
        const prev = document.getElementById("photoPreview");
        if (prev) prev.innerHTML = `<img src="${dataUrl}" alt="Preview" />`;
      } catch (error) {
        toast("Photo gagal dibaca.");
      }
    }

    function resizeImage(file, maxSize, quality) {
      return new Promise((resolve, reject) => {
        if (!file.type.startsWith("image/")) {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
          return;
        }
        const reader = new FileReader();
        reader.onerror = reject;
        reader.onload = () => {
          const img = new Image();
          img.onerror = reject;
          img.onload = () => {
            let { width, height } = img;
            if (width > height && width > maxSize) { height = Math.round(height * maxSize / width); width = maxSize; }
            if (height >= width && height > maxSize) { width = Math.round(width * maxSize / height); height = maxSize; }
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL("image/jpeg", quality));
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function photoMarkup(ev, fallback) {
      if (!ev) return esc(fallback || "Photo");
      if (ev.photoDataUrl) return `<img src="${ev.photoDataUrl}" alt="${esc(ev.photoName || fallback || "Photo")}" />`;
      if (ev.photoLink) {
        const previewUrl = getPhotoPreviewUrl(ev.photoLink);
        return `<img src="${esc(previewUrl)}" alt="${esc(ev.photoName || fallback || "Photo")}" loading="lazy" referrerpolicy="no-referrer" onerror="this.outerHTML='${esc(fallback || "Photo")}';" />`;
      }
      return esc(fallback || "Photo");
    }

    function getPhotoPreviewUrl(link) {
      const raw = String(link || "").trim();
      const driveId = extractDriveFileId(raw);
      if (driveId) return `https://drive.google.com/thumbnail?id=${encodeURIComponent(driveId)}&sz=w1000`;
      return raw;
    }

    function extractDriveFileId(link) {
      const raw = String(link || "");
      const byPath = raw.match(/\/d\/([a-zA-Z0-9_-]{10,})/);
      if (byPath) return byPath[1];
      const byId = raw.match(/[?&]id=([a-zA-Z0-9_-]{10,})/);
      if (byId) return byId[1];
      const openId = raw.match(/open\?id=([a-zA-Z0-9_-]{10,})/);
      if (openId) return openId[1];
      return "";
    }

    function driverInfo(ev) {
      if (!ev) return "-";
      return [ev.driverName, ev.driverPhone, ev.noPlat].filter(Boolean).join(" / ") || "-";
    }

    function durationText(dateIn) {
      if (!dateIn) return "-";
      const diff = Date.now() - new Date(dateIn).getTime();
      if (!Number.isFinite(diff) || diff < 0) return "0 jam";
      const hours = Math.floor(diff / 36e5);
      const days = Math.floor(hours / 24);
      const rem = hours % 24;
      if (days > 0) return `${days} hari ${rem} jam`;
      return `${hours} jam`;
    }

    function formatDate(value) {
      if (!value) return "-";
      const d = new Date(value);
      if (!Number.isFinite(d.getTime())) return value;
      return d.toLocaleString("id-ID", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" });
    }

    function nowInputValue() {
      const d = new Date();
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      return d.toISOString().slice(0, 16);
    }

    function normalizeDateInput(value) {
      if (!value) return new Date().toISOString();
      const d = new Date(value);
      return Number.isFinite(d.getTime()) ? d.toISOString() : new Date().toISOString();
    }

    function buildClientKey(event) {
      const depot = eventDepot(event);
      const container = norm(event?.container);
      const type = norm(event?.type || (norm(event?.movement).startsWith("RP") ? "OUT" : "IN"));
      const movement = norm(event?.movement);
      const related = norm(event?.relatedInId);
      let dateKey = "";
      const d = new Date(event?.date || "");
      if (Number.isFinite(d.getTime())) dateKey = d.toISOString().slice(0, 16);
      return [depot, container, type, movement, related, dateKey].join("|");
    }

    function buildPhotoName(container, movement, dateValue) {
      const safeDate = (dateValue || nowInputValue()).replace(/[^0-9]/g, "").slice(0, 12);
      return `${container || "CONTAINER"}_${movement || "MOVEMENT"}_${safeDate}.jpg`;
    }

    function getVal(id) { return (document.getElementById(id)?.value || "").trim(); }
    function norm(value) { return String(value || "").trim().toUpperCase(); }
    function esc(value) {
      return String(value ?? "").replace(/[&<>'"]/g, ch => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "'":"&#39;", '"':"&quot;" }[ch]));
    }

    function cryptoRandomId() {
      if (window.crypto?.randomUUID) return crypto.randomUUID();
      return "id_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2);
    }

    let toastTimer = null;
    function toast(message) {
      const el = document.getElementById("toast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove("show"), 3200);
    }
  </script>
</body>
